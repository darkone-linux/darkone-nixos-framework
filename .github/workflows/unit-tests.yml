name: Nix Tests

on:
  push:
    branches: [main]
    paths:
      - "dnf/lib/**"
      - "dnf/tests/unit/**"
  pull_request:
    paths:
      - "dnf/lib/**"
      - "dnf/tests/unit/**"

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Run unit tests
        run: nix run nixpkgs#nix-unit -- --flake .#libTests
